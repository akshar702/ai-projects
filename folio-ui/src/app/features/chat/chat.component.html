<div class="flex flex-col h-screen" style="background: var(--bg-primary); color: var(--text-primary);">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 md:px-6 py-3 shrink-0" [attr.style]="headerBorderStyle">
        <div 
        class="flex items-center gap-2 cursor-pointer"
        (click)="router.navigate(['/'])">
        <div class="w-6 h-6 rounded-md flex items-center justify-center" style="background: var(--accent);">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 3h8M2 6h6M2 9h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="text-sm font-medium tracking-tight">Folio</span>
        </div>
  
      <!-- Active document name -->
      <div *ngIf="pdfService.activeDocument()" class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-sm" style="background: var(--accent); opacity: 0.8;"></div>
        <span class="text-xs font-medium" style="color: var(--text-secondary);">
          {{ pdfService.activeDocument()?.filename }}
        </span>
      </div>
  
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2">
          <button
            *ngFor="let theme of themes"
            (click)="setAccent(theme)"
            style="width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: transform 0.15s; flex-shrink: 0;"
            [style.background]="themeColors[theme]"
            [style.outline]="themeService.accent() === theme ? '2px solid ' + themeColors[theme] : 'none'"
            [style.outline-offset]="'2px'">
          </button>
        </div>
  
        <button
          (click)="toggleMode()"
          class="w-7 h-7 rounded-lg flex items-center justify-center"
          style="background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.08);">
          <svg *ngIf="themeService.mode() === 'dark'" width="12" height="12" viewBox="0 0 24 24" fill="none" style="color: var(--text-secondary)">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg *ngIf="themeService.mode() === 'light'" width="12" height="12" viewBox="0 0 24 24" fill="none" style="color: var(--text-primary)">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>
  
    <!-- Body -->
    <div class="flex flex-1 overflow-hidden">
  
      <!-- Sidebar — hidden on mobile -->
      <div class="hidden md:block">
        <app-sidebar />
      </div>
  
      <!-- Chat area -->
      <div class="flex flex-col flex-1 overflow-hidden">
  
        <!-- Messages -->
        <div class="flex-1 overflow-y-auto px-4 md:px-8 py-6">
          <div class="max-w-3xl mx-auto flex flex-col gap-6">
  
            <!-- Empty state -->
            <div *ngIf="chatService.messages().length === 0"
              class="flex flex-col items-center justify-center h-64 gap-3 text-center">
              <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.08);">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="color: var(--accent)">
                  <path d="M10 2a8 8 0 1 0 0 16A8 8 0 0 0 10 2zm0 3v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <p class="text-sm font-medium">Ask anything</p>
              <p class="text-xs" style="color: var(--text-muted);">Every answer comes with page citations</p>
            </div>
  
            <!-- Messages list -->
            <app-message
              *ngFor="let message of chatService.messages()"
              [message]="message">
            </app-message>
  
            <!-- Error -->
            <div *ngIf="chatService.error()" class="text-sm text-red-400 text-center">
              {{ chatService.error() }}
            </div>
  
            <!-- Scroll anchor -->
            <div #messagesEnd></div>
          </div>
        </div>
  
        <!-- Input area -->
<div class="shrink-0 px-4 md:px-8 py-4"
[style.border-top]="themeService.mode() === 'dark' ? '0.5px solid rgba(255,255,255,0.06)' : '0.5px solid rgba(0,0,0,0.08)'">
<div class="max-w-3xl mx-auto flex flex-col gap-2">

  <!-- Mode toggle -->
  <div class="flex items-center gap-2" *ngIf="pdfService.activeDocument()">
    <button
      (click)="chatMode = 'document'"
      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
      [style.background]="chatMode === 'document' ? 'var(--accent)' : 'rgba(255,255,255,0.04)'"
      [style.color]="chatMode === 'document' ? 'white' : 'var(--text-muted)'"
      [style.border]="chatMode === 'document' ? 'none' : '0.5px solid rgba(255,255,255,0.08)'">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
        <path d="M3 1h5l2 2v8H3V1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      Document
    </button>
    <button
      (click)="chatMode = 'general'"
      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
      [style.background]="chatMode === 'general' ? 'var(--accent)' : 'rgba(255,255,255,0.04)'"
      [style.color]="chatMode === 'general' ? 'white' : 'var(--text-muted)'"
      [style.border]="chatMode === 'general' ? 'none' : '0.5px solid rgba(255,255,255,0.08)'">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
        <path d="M2 4h8M2 8h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      General
    </button>
    <span class="text-xs" style="color: var(--text-muted);">
      {{ chatMode === 'document' ? 'Asking about ' + pdfService.activeDocument()?.filename : 'General conversation' }}
    </span>
  </div>

  <!-- Input row -->
  <div class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all"
    [style.background]="themeService.mode() === 'dark' ? 'rgba(255,255,255,0.04)' : '#f5f5f5'"
    [style.border]="themeService.mode() === 'dark' ? '0.5px solid rgba(255,255,255,0.08)' : '0.5px solid #e5e5e5'">

    <input
      #inputRef
      type="text"
      [(ngModel)]="question"
      (keydown)="onKeydown($event)"
      [placeholder]="chatMode === 'document' ? 'Ask anything about your document...' : 'Ask anything...'"
      class="flex-1 bg-transparent outline-none text-sm"
      style="color: var(--text-primary);"
      [disabled]="chatService.isStreaming()"/>

    <button
      (click)="sendMessage()"
      [disabled]="!question.trim() || chatService.isStreaming()"
      class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 transition-all"
      [style.background]="question.trim() && !chatService.isStreaming() ? 'var(--accent)' : 'rgba(255,255,255,0.06)'"
      [style.opacity]="!question.trim() || chatService.isStreaming() ? '0.5' : '1'">
      <svg *ngIf="!chatService.isStreaming()" width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2 11L11 6.5L2 2v3.5l6 1-6 1V11z" fill="white"/>
      </svg>
      <div *ngIf="chatService.isStreaming()"
        class="w-3 h-3 rounded-full border-2 animate-spin"
        style="border-color: var(--accent); border-top-color: transparent;">
      </div>
    </button>
  </div>

  <p class="text-center text-xs font-mono" style="color: var(--text-muted);">
    llama-3.3-70b · gemini-embedding-001
  </p>
</div>
</div>
  
      </div>
    </div>
  </div>
